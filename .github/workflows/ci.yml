name: Code Quality

on:
  workflow_dispatch:
  push:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    name: Verify Stability
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: codra_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/codra_test
      TEST_DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/codra_test
      GITHUB_APP_SLUG: codra-test-app
      GITHUB_APP_WEBHOOK_SECRET: fake-webhook-secret
      GITHUB_CLIENT_ID: fake-dashboard-client-id
      GITHUB_CLIENT_SECRET: fake-dashboard-client-secret
      AUTH_CALLBACK_URL: https://codra.test/auth/github/callback
      APP_URL: https://codra.test
      # Must match the mock GitHub login ('devarshishimpi') in test/api.spec.ts;
      # changing this value breaks the auth happy-path tests.
      DASHBOARD_ALLOWED_USERS: devarshishimpi
      BOT_USERNAME: codra-test-app
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Resolve Playwright version
        id: playwright-version
        run: echo "version=$(node -p "require('playwright/package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          # Browser binaries are versioned with Playwright itself, so key on the resolved
          # Playwright version rather than the whole lockfile hash — a bump to any unrelated
          # dependency shouldn't bust (or falsely reuse) the browser cache.
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Static Analysis (Typecheck)
        run: npm run typecheck

      - name: Automated Tests
        run: npm test

      - name: Browser Tests
        run: npm run test:browser
